version: "3.8"

services:
  event-gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ACCOUNT_SERVICE_URL=http://host.docker.internal:8081
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

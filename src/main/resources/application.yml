server:
  port: 8080

spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

account-service:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
  connect-timeout-ms: 1000
  read-timeout-ms: 2000

security:
  jwt:
    # Validates tokens presented by external clients calling this Gateway.
    # In production this secret would come from your actual token issuer
    # (or you'd switch to issuer-uri/jwk-set-uri if using a real OAuth2
    # Authorization Server) - override via env var everywhere but local dev.
    client-secret: ${JWT_CLIENT_SECRET:dev-only-client-shared-secret-change-me-32bytes+}
    # Used to mint short-lived service-to-service tokens when calling the
    # Account Service. Must match account-service's security.jwt.internal-secret.
    internal-secret: ${JWT_INTERNAL_SECRET:dev-only-internal-shared-secret-change-me-32bytes+}
    internal-issuer: event-gateway
    internal-audience: account-service
    internal-token-ttl-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: event-gateway

logging:
  level:
    root: INFO
